  <style>
    /* ── CSS Variables ─────────────────────────────────────── */
    :root {
      --deep-navy:    #0F1A2E;
      --dark-navy:    #1A2940;
      --mid-navy:     #2E4057;
      --copper-light: #D4873F;
      --copper-dark:  #DA9048;
      --electric:     #FF6B1A;
      --warm-white:   #F2F0EB;

      --bg:           var(--warm-white);
      --text:         var(--mid-navy);
      --subtext:      var(--mid-navy);
      --copper:       var(--copper-light);

      --logo-main:    #0F1A2E;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         var(--deep-navy);
        --text:       var(--warm-white);
        --subtext:    #a0b0c0;
        --copper:     var(--copper-dark);
        --logo-main:  #F2F0EB;
      }
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ── Layout ────────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      animation: fadeUp 0.9s ease both;
    }

    /* ── Logo ──────────────────────────────────────────────── */
    .logo-wrap {
      width: 100%;
      max-width: 560px;
    }

    .logo-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .logo-desktop { display: block; }
    .logo-mobile  { display: none;  }

    @media (max-width: 600px) {
      .logo-desktop { display: none;  }
      .logo-mobile  { display: block; max-width: 220px; }
    }

    /* ── Diamond spin ──────────────────────────────────────── */
    .logo-diamond {
      transform-box: fill-box;
      transform-origin: center;
    }

    /* ── Tagline ───────────────────────────────────────────── */
    .tagline {
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--text);
      letter-spacing: 0.01em;
      text-align: center;
      line-height: 1.5;
      max-width: 480px;
      opacity: 0.85;
    }

    /* ── CTA Button ──────────────────────────────────────── */
    .cta-button {
      font-family: 'Montserrat', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background-color: var(--electric);
      text-decoration: none;
      letter-spacing: 0.04em;
      padding: 0.75rem 2.25rem;
      border-radius: 4px;
      transition: opacity 0.2s ease, transform 0.15s ease;
    }

    .cta-button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* ── Footer ────────────────────────────────────────────── */
    .footer {
      position: absolute;
      bottom: 2rem;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      color: var(--subtext);
      opacity: 0.35;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Animation ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <script>
    (function () {
      var diamonds = document.querySelectorAll('.logo-diamond');
      var rotation = 0;
      var velocity = 0;
      var rafId = null;
      var lastWheelTime = 0;

      function setTransition(on) {
        var t = on ? 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)' : 'none';
        for (var i = 0; i < diamonds.length; i++) {
          diamonds[i].style.transition = t;
        }
      }

      function applyRotation(r) {
        for (var i = 0; i < diamonds.length; i++) {
          diamonds[i].style.transform = 'rotate(' + r + 'deg)';
        }
      }

      function step() {
        // Free-spin with friction
        velocity *= 0.94;
        rotation += velocity;
        applyRotation(rotation);

        // Once slowed enough after wheel stops, CSS-spring snap to nearest 90°
        if (Date.now() - lastWheelTime > 150 && Math.abs(velocity) < 3) {
          rafId = null;
          rotation = Math.round(rotation / 90) * 90;
          setTransition(true);
          applyRotation(rotation);
          return;
        }

        rafId = requestAnimationFrame(step);
      }

      function kick() {
        lastWheelTime = Date.now();
        setTransition(false);
        if (!rafId) rafId = requestAnimationFrame(step);
      }

      window.addEventListener('wheel', function (e) {
        e.preventDefault();
        velocity += e.deltaY * 0.08;
        kick();
      }, { passive: false });

      var touchStartY = 0;

      window.addEventListener('touchstart', function (e) {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      window.addEventListener('touchmove', function (e) {
        e.preventDefault();
        var delta = touchStartY - e.touches[0].clientY;
        touchStartY = e.touches[0].clientY;
        velocity += delta * 0.3;
        kick();
      }, { passive: false });
    })();
  </script>
