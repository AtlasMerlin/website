<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas Merlin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* ── CSS Variables ─────────────────────────────────────── */
    :root {
      --deep-navy:    #0F1A2E;
      --dark-navy:    #1A2940;
      --mid-navy:     #2E4057;
      --copper-light: #D4873F;
      --copper-dark:  #DA9048;
      --electric:     #FF6B1A;
      --warm-white:   #F2F0EB;

      --bg:           var(--warm-white);
      --text:         var(--mid-navy);
      --subtext:      var(--mid-navy);
      --copper:       var(--copper-light);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      var(--deep-navy);
        --text:    var(--warm-white);
        --subtext: #a0b0c0;
        --copper:  var(--copper-dark);
      }
    }

    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Lora', serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ── Layout ────────────────────────────────────────────── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      position: relative;
    }

    /* ── Subtle background texture ─────────────────────────── */
    .page::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(212, 135, 63, 0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(15, 26, 46, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    @media (prefers-color-scheme: dark) {
      .page::before {
        background-image: radial-gradient(circle at 20% 80%, rgba(218, 144, 72, 0.06) 0%, transparent 50%),
                          radial-gradient(circle at 80% 20%, rgba(242, 240, 235, 0.02) 0%, transparent 50%);
      }
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      animation: fadeUp 0.9s ease both;
    }

    /* ── Logo ──────────────────────────────────────────────── */
    .logo-wrap {
      width: 100%;
      max-width: 560px;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 600px) {
      .logo-wrap { max-width: 220px; }
    }

    /* Light/dark mode logo switching */
    .logo-light { display: block; }
    .logo-dark  { display: none;  }

    @media (prefers-color-scheme: dark) {
      .logo-light { display: none;  }
      .logo-dark  { display: block; }
    }

    /* ── Divider ───────────────────────────────────────────── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--copper);
      border: none;
      border-radius: 1px;
      opacity: 0.7;
    }

    /* ── Tagline ───────────────────────────────────────────── */
    .tagline {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      color: var(--text);
      letter-spacing: 0.01em;
      text-align: center;
      line-height: 1.5;
      max-width: 480px;
      opacity: 0.85;
    }

    /* ── CTA Button ──────────────────────────────────────── */
    .cta-button {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      background-color: var(--electric);
      text-decoration: none;
      letter-spacing: 0.04em;
      padding: 0.75rem 2.25rem;
      border-radius: 4px;
      transition: opacity 0.2s ease, transform 0.15s ease;
    }

    .cta-button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    /* ── Footer ────────────────────────────────────────────── */
    .footer {
      position: absolute;
      bottom: 2rem;
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem;
      color: var(--subtext);
      opacity: 0.35;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Animation ─────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="page">

    <div class="content">

      <!-- Logo: light mode (dark ink on light background) -->
      <div class="logo-wrap logo-light">
        <picture>
          <source media="(max-width: 600px)" srcset="darklogo_for_lightbackground_mobile.svg" />
          <img src="darklogo_for_lightbackground_desktop.svg" alt="Atlas Merlin" />
        </picture>
      </div>

      <!-- Logo: dark mode (light ink on dark background) -->
      <div class="logo-wrap logo-dark">
        <picture>
          <source media="(max-width: 600px)" srcset="lightlogo_for_darkbackground_mobile.svg" />
          <img src="lightlogo_for_darkbackground_desktop.svg" alt="Atlas Merlin" />
        </picture>
      </div>

      <hr class="divider" />

      <p class="tagline">Coming soon.</p>

      <a class="cta-button" href="mailto:hello@atlasmerlin.com">Say Hello</a>

    </div>

    <p class="footer">Atlas Merlin Ltd</p>

  </main>
</body>
</html>
